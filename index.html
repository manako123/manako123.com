<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Mega SlowTube</title>
<style>
    /* Basis */
    body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
    header { background:#ff0000; color:white; padding:10px 20px; display:flex; align-items:center; justify-content:space-between; position: sticky; top:0; z-index:100; }
    header input { padding:5px 10px; width:300px; border-radius:4px; border:none; }

    nav { background:#202020; color:white; padding:10px; display:flex; gap:10px; position: sticky; top:50px; z-index:90; }
    nav a { color:white; text-decoration:none; padding:5px 10px; background:#333; border-radius:4px; }

    main { display:flex; padding:20px; gap:20px; }
    .sidebar { width:220px; background:#f1f1f1; padding:10px; border-radius:8px; }
    .sidebar p { margin:10px 0; cursor:pointer; font-weight:bold; color:#333; }

    .content { flex:1; }
    .videos { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:20px; }

    .video-card { background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); cursor:pointer; transition: transform 0.2s; }
    .video-card:hover { transform: scale(1.03); }
    .video-card img { width:100%; display:block; }
    .video-card h3 { margin:10px 10px 5px 10px; font-size:16px; }
    .video-card p { margin:0 10px 10px 10px; font-size:12px; color: #555; }

    section.upload { margin-bottom:20px; }
    section.upload input { padding:5px; }
    section.upload button { padding:5px 10px; margin-left:5px; cursor:pointer; background:#ff0000; color:white; border:none; border-radius:4px; }

    /* Popup */
    .popup { position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; }
    .popup-content { background:white; padding:20px; border-radius:8px; max-width:600px; width:90%; position:relative; }
    .popup-close { position:absolute; top:10px; right:10px; cursor:pointer; font-weight:bold; font-size:20px; }
    .popup video { width:100%; border-radius:4px; }
</style>
</head>
<body>

<header>
    <span>Mega Mega SlowTube</span>
    <input type="text" placeholder="Suche...">
</header>

<nav>
    <a href="#">Start</a>
    <a href="#">Trending</a>
    <a href="#">Abos</a>
    <a href="#">Bibliothek</a>
</nav>

<main>
    <div class="sidebar">
        <p>Home</p>
        <p>Videos</p>
        <p>Playlists</p>
        <p>Community</p>
    </div>

    <div class="content">
        <section class="upload">
            <h2>Video Upload</h2>
            <input type="file" id="videoInput">
            <button id="uploadBtn">Upload</button>
            <p id="status"></p>
        </section>

        <section class="videos" id="videoContainer">
            <!-- Videos per JS generiert -->
        </section>
    </div>
</main>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-content">
        <span class="popup-close" id="popupClose">&times;</span>
        <h2 id="popupTitle"></h2>
        <p id="popupChannel"></p>
        <p id="popupViews"></p>
        <video id="popupVideo" controls></video>
    </div>
</div>

<script>
const videoContainer = document.getElementById('videoContainer');
const videoInput = document.getElementById('videoInput');
const uploadBtn = document.getElementById('uploadBtn');
const status = document.getElementById('status');

// Popup
const popup = document.getElementById('popup');
const popupTitle = document.getElementById('popupTitle');
const popupChannel = document.getElementById('popupChannel');
const popupViews = document.getElementById('popupViews');
const popupVideo = document.getElementById('popupVideo');
const popupClose = document.getElementById('popupClose');

// Demo-Videos
let videos = []; // Array mit Objekten {title, channel, views, src}

// Funktion Videos anzeigen
function renderVideos() {
    videoContainer.innerHTML = '';
    videos.forEach((v,i) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <img src="https://via.placeholder.com/250x140?text=Video+${i+1}" alt="Video">
            <h3>${v.title}</h3>
            <p>${v.channel} • ${v.views} Aufrufe</p>
        `;
        card.onclick = () => {
            popupTitle.textContent = v.title;
            popupChannel.textContent = v.channel;
            popupViews.textContent = v.views + ' Aufrufe';
            popupVideo.src = v.src;
            popup.style.display = 'flex';
        };
        videoContainer.appendChild(card);
    });
}

// Upload Demo (lokal, ohne Server)
uploadBtn.onclick = () => {
    const file = videoInput.files[0];
    if(!file) return alert('Bitte wähle ein Video!');
    const url = URL.createObjectURL(file);
    videos.unshift({title:file.name, channel:"Du", views:Math.floor(Math.random()*1000), src:url});
    renderVideos();
    status.textContent = 'Upload erfolgreich!';
    videoInput.value = '';
};

// Popup schließen
popupClose.onclick = () => popup.style.display = 'none';
popup.onclick = (e) => { if(e.target===popup) popup.style.display='none'; };

// Demo-Videos generieren
for(let i=1;i<=10;i++){
    videos.push({
        title: 'Beispielvideo ' + i,
        channel: 'Kanal ' + i,
        views: Math.floor(Math.random()*1000),
        src: 'https://www.w3schools.com/html/mov_bbb.mp4'
    });
}

renderVideos();
</script>

</body>
</html>
